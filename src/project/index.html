<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>武汉理工大学 - 校园导航</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
</head>

<body>
    <!-- 固定定位的Logo - 左上角 -->
    <div class="logo-fixed">
        <a href="https://www.whut.edu.cn/" target="_blank" class="logo-link">
            <img src="images/wuhan-university-of-technology-logo-1024px.png" alt="武汉理工大学logo" class="logo">
        </a>
        <div class="school-abbr">WHUT</div>
    </div>
    
    <!-- 固定定位的导航栏 - 右上角 -->
    <nav class="nav-fixed">
        <ul>
            <li><a href="https://www.whut.edu.cn/" target="_blank"><i class="fas fa-home"></i> 首页</a></li>
            <li><a href="#introduction"><i class="fas fa-info-circle"></i> 学校介绍</a></li>
            <li><a href="#food"><i class="fas fa-utensils"></i> 食在理工</a></li>
            <li><a href="#study"><i class="fas fa-book-open"></i> 学在理工</a></li>
            <li><a href="#sight"><i class="fas fa-map-marked-alt"></i> 游在理工</a></li>
            <li><a href="#music"><i class="fas fa-music"></i> 背景音乐</a></li>
        </ul>
    </nav>

    <!-- 主要内容 - 首页只显示名称和校训 -->
    <main class="container">
        <div class="main-content">
            <div class="name">武汉理工大学</div>
            <h3 class="spirit">厚德博学 追求卓越</h3>
            
            <!-- 滚动提示箭头 -->
            <div class="scroll-hint">
                <i class="fas fa-chevron-down"></i>
            </div>
        </div>
    </main>

    <!-- 特色功能区 - 下滑展示 -->
    <section class="features-section" id="features">
        <div class="container">
            <h2 class="section-title">探索武汉理工大学</h2>
            <div class="features" id="features-container">
                <div class="feature-card" id="food">
                    <div class="feature-icon">
                        <i class="fas fa-utensils"></i>
                    </div>
                    <h3 class="feature-title">食在理工</h3>
                    <p class="feature-desc">探索南湖校区、升升公寓、鉴湖校区等各食堂美食，从热干面到特色小吃，满足你的味蕾。</p>
                </div>
                
                <div class="feature-card" id="study">
                    <div class="feature-icon">
                        <i class="fas fa-graduation-cap"></i>
                    </div>
                    <h3 class="feature-title">学在理工</h3>
                    <p class="feature-desc">图书馆资源、自习室分布、特色专业介绍，助力你在学术道路上不断前行。</p>
                </div>
                
                <div class="feature-card" id="sight">
                    <div class="feature-icon">
                        <i class="fas fa-landmark"></i>
                    </div>
                    <h3 class="feature-title">游在理工</h3>
                    <p class="feature-desc">漫步南湖畔、参观飞马广场、打卡特色建筑，感受理工大的校园美景。</p>
                </div>
            </div>
        </div>
    </section>

    <!-- 页脚 -->
    <footer>
        <p class="footer-text">© 2026 武汉理工大学 校园导航测试页面 | 数据来源：武汉理工大学官网</p>
    </footer>

    <script src="js/script.js"></script>
</body>
</html>
